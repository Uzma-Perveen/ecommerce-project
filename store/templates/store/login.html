{% extends 'store/base.html' %}
{% block content %}
<div style="max-width:400px; margin:40px auto; background:white; padding:30px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
  <h2 style="margin-bottom:20px;">Login</h2>
  <form method="post">
    {% csrf_token %}
    <div style="margin-bottom:14px;">
      <label style="display:block; font-size:14px; margin-bottom:4px;">Username</label>
      <input type="text" name="username" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
    </div>
    <div style="margin-bottom:14px;">
      <label style="display:block; font-size:14px; margin-bottom:4px;">Password</label>
      <input type="password" name="password" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
    </div>
    <button type="submit" class="btn" style="width:100%;">Login</button>
  </form>
  <p style="margin-top:14px; font-size:14px;">Don't have an account? <a href="{% url 'register' %}">Register</a></p>
</div>
{% endblock %}
