<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyShop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body { background: #f5f5f5; }
    nav { background: #2c3e50; padding: 14px 30px; display: flex;
          justify-content: space-between; align-items: center; color: white; }
    nav a { color: white; text-decoration: none; margin-left: 16px; font-size: 14px; }
    nav a:hover { text-decoration: underline; }
    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
    .btn { padding: 8px 16px; background: #2c3e50; color: white;
           border: none; border-radius: 4px; cursor: pointer; text-decoration: none;
           font-size: 14px; display: inline-block; }
    .btn:hover { background: #1a252f; }
    .btn-danger { background: #e74c3c; }
    .btn-danger:hover { background: #c0392b; }
    .btn-success { background: #27ae60; }
    .messages { list-style: none; margin-bottom: 16px; }
    .messages li { padding: 10px; border-radius: 4px; margin-bottom: 6px; }
    .messages .success { background: #d4edda; color: #155724; }
    .messages .error   { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
<nav>
  <a href="/" style="font-size:20px; font-weight:bold;">🛒 MyShop</a>
  <div>
    {% if user.is_authenticated %}
      <span>Hello, {{ user.username }}</span>
      <a href="{% url 'cart' %}">Cart</a>
      <a href="{% url 'order_history' %}">Orders</a>
      <a href="{% url 'logout' %}">Logout</a>
    {% else %}
      <a href="{% url 'login' %}">Login</a>
      <a href="{% url 'register' %}">Register</a>
    {% endif %}
  </div>
</nav>

<div class="container">
  {% if messages %}
    <ul class="messages" style="margin-top:16px;">
      {% for msg in messages %}
        <li class="{{ msg.tags }}">{{ msg }}</li>
      {% endfor %}
    </ul>
  {% endif %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
