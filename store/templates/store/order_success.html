{% extends 'store/base.html' %}
{% block content %}
<div style="text-align:center; padding:60px 20px;">
  <h1 style="color:#27ae60; font-size:48px;">✅</h1>
  <h2 style="margin:16px 0;">Order Placed Successfully!</h2>
  <p style="color:#555;">Order ID: <strong>{{ order.order_id }}</strong></p>
  <p style="color:#555; margin-top:8px;">Total: <strong>Rs. {{ order.total }}</strong></p>
  <div style="margin-top:24px;">
    <a href="{% url 'order_history' %}" class="btn">View My Orders</a>
    <a href="{% url 'home' %}" class="btn" style="margin-left:10px;">Continue Shopping</a>
  </div>
</div>
{% endblock %}
