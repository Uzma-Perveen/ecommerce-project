{% extends 'store/base.html' %}
{% block content %}
<div style="max-width:400px; margin:40px auto; background:white; padding:30px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,0.1);">
  <h2 style="margin-bottom:20px;">Register</h2>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
      <div style="margin-bottom:14px;">
        <label style="display:block; font-size:14px; margin-bottom:4px;">{{ field.label }}</label>
        {{ field }}
        {% if field.errors %}<p style="color:red;font-size:12px;">{{ field.errors }}</p>{% endif %}
      </div>
    {% endfor %}
    <button type="submit" class="btn" style="width:100%;">Register</button>
  </form>
  <p style="margin-top:14px; font-size:14px;">Already have an account? <a href="{% url 'login' %}">Login</a></p>
</div>
{% endblock %}
