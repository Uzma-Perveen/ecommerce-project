{% extends 'store/base.html' %}
{% block content %}
<h2 style="margin-bottom:20px;">Checkout</h2>
<div style="background:white; padding:24px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); max-width:500px;">
  <h3 style="margin-bottom:12px;">Order Summary</h3>
  {% for item in cart.cartitem_set.all %}
    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
      <span>{{ item.product.name }} × {{ item.quantity }}</span>
      <span>Rs. {{ item.get_subtotal }}</span>
    </div>
  {% endfor %}
  <hr style="margin:14px 0;">
  <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:18px;">
    <span>Total</span>
    <span style="color:#e74c3c;">Rs. {{ cart.get_total }}</span>
  </div>
  <form method="post" style="margin-top:20px;">
    {% csrf_token %}
    <button type="submit" class="btn btn-success" style="width:100%; padding:12px; font-size:16px;">
      Place Order
    </button>
  </form>
</div>
{% endblock %}
